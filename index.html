<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Live2D Viewer</title>
    </head>
    <body>
        <div id="app"></div>

        <!-- Load library files in correct order -->
        <script src="/libs/pixi-7.4.2.min.js"></script>
        <script src="/libs/live2dcubismcore.min.js"></script>

        <script src="/libs/cubism4.min.js"></script>
        <!-- Load Vue app after libraries are ready -->
        <script>
            // Wait for all libraries to load
            function checkLibrariesLoaded() {
                if (
                    typeof PIXI !== "undefined" &&
                    window.PIXI &&
                    window.PIXI.live2d &&
                    window.PIXI.live2d.Live2DModel &&
                    window.PIXI.live2d.Cubism4ModelSettings
                ) {
                    console.log("✅ All libraries loaded, starting Vue app");

                    // Dynamically load Vue app
                    const script = document.createElement("script");
                    script.type = "module";
                    script.src = "/src/main.js";
                    document.body.appendChild(script);
                } else {
                    console.log("⏳ Waiting for libraries to load...", {
                        PIXI: typeof PIXI !== "undefined",
                        live2d: !!window.PIXI?.live2d,
                        Live2DModel: !!window.PIXI?.live2d?.Live2DModel,
                        Cubism4ModelSettings:
                            !!window.PIXI?.live2d?.Cubism4ModelSettings,
                    });
                    setTimeout(checkLibrariesLoaded, 100);
                }
            }

            // Start checking
            setTimeout(checkLibrariesLoaded, 100);
        </script>
    </body>
</html>
